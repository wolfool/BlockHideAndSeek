# 블럭 숨바꼭질 설정 파일

# 게임 모드
# 1: 쉬프트 시 발 아래 블럭 위치에 정수 좌표로 고정 (블럭 탐색형)
# 2: 게임 시작/주기마다 블럭 선택 GUI (변신형)
game-mode: 2

# 최소 시작 인원 (테스트 시 1로 낮추세요)
min-players: 1

times:
  hide-time: 60   # 숨기 시간 (초)
  game-time: 300  # 술래잡기 시간 (초)

hints:
  max-usages: 3   # 힌트 사용 횟수 (게임당)

# 모드 2 전용 설정
mode2:
  change-interval: 60    # 블럭 변경 주기 (초)
  selection-time: 10     # 선택 제한 시간 (초, 초과 시 랜덤 선택)
  choices-count: 5       # 선택지 블럭 개수 (랜덤)

selectable-blocks:
  - BOOKSHELF
  - CRAFTING_TABLE
  - HAY_BLOCK
  - MELON
  - PUMPKIN
  - OAK_LOG
  - BIRCH_LOG
  - DIAMOND_ORE
  - COAL_ORE
  - IRON_ORE
  - GOLD_BLOCK
  - EMERALD_BLOCK
  - STONE_BRICKS
  - MOSSY_STONE_BRICKS
  - CHISELED_STONE_BRICKS
  - BRICKS
  - SANDSTONE
  - RED_SANDSTONE
  - JACK_O_LANTERN
  - TNT
