# 블럭 숨바꼭질 설정 파일

# 게임 모드
# 1: 쉬프트 시 발 아래 블럭 위치에 정수 좌표로 고정 (블럭 탐색형)
# 2: 게임 시작/주기마다 블럭 선택 GUI (변신형)
game-mode: 2

# 최소 시작 인원 (테스트 시 1로 낮추세요)
min-players: 1

game:
  hunter-count: 1
  allow-runtime-hunter-change: true

times:
  hide-time: 60   # 숨기 시간 (초)
  game-time: 300  # 술래잡기 시간 (초)

hints:
  max-usages: 3   # 힌트 사용 횟수 (게임당)

# 모드 2 전용 설정
mode2:
  change-interval: 60    # 블럭 변경 주기 (초)
  selection-time: 30     # 선택 제한 시간 (초, 초과 시 랜덤 선택)
  choices-count: 5       # 선택지 블럭 개수 (랜덤)

selectable-blocks:
  - BOOKSHELF
  - CRAFTING_TABLE
  - HAY_BLOCK
  - MELON
  - PUMPKIN
  - OAK_LOG
  - BIRCH_LOG
  - DIAMOND_ORE
  - COAL_ORE
  - IRON_ORE
  - GOLD_BLOCK
  - EMERALD_BLOCK
  - STONE_BRICKS
  - MOSSY_STONE_BRICKS
  - CHISELED_STONE_BRICKS
  - BRICKS
  - SANDSTONE
  - RED_SANDSTONE
  - JACK_O_LANTERN
  - TNT

# CraftEngine 커스텀 블럭도 모드 2 선택 GUI에 같이 들어갑니다.
# auto-discover: true 이면 CraftEngine에 등록된 모든 커스텀 블럭을 자동으로 불러옵니다.
# namespace가 없으면 default-namespace가 붙습니다.
# 예: "chair" -> "craftengine:chair"
# 예: "my_pack:chair" -> "my_pack:chair"
craftengine:
  auto-discover: true
  default-namespace: craftengine
  blocks: []

# 위험도 점수 (5Tick마다 누적 계산)
danger:
  check-tick: 5
  range-8: 1
  range-5: 3
  range-3: 5
  range-1: 10

# 도발(Emote) 설정
emote:
  cooldown-seconds: 30

# 스킬 ON/OFF
skill:
  hunter-enabled: true
  hider-enabled: true

# 근접 경고 (숨는 플레이어 전용)
proximity:
  check-tick: 5
  range-8:
    enabled: true
    distance: 8
    heartbeat-sound: true
  range-5:
    enabled: true
    distance: 5
    screen-shake: true
  range-3:
    enabled: true
    distance: 3
    warning-sound: true
    particles: true
